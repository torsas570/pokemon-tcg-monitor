name: Monitor Pokemon TCG 30 Aniversario

on:
  # Cron DESACTIVADO: el monitor continuo (monitor-high.yml) ya vigila TODAS las
  # tiendas cada ~1 min. Dejar este cron activo duplicaria el trabajo y competiria
  # por el state.json cacheado. Se mantiene lanzable a mano.
  # schedule:
  #   - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches: [master, main]
    paths: ['.github/workflows/monitor.yml']

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state
        uses: actions/cache/restore@v5
        with:
          path: state.json
          # Clave única por run + restauración por prefijo (compartida con monitor-high).
          key: monitor-state-${{ github.run_id }}
          restore-keys: monitor-state-

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 monitor.py

      - name: Save state
        if: always()
        uses: actions/cache/save@v5
        with:
          path: state.json
          key: monitor-state-${{ github.run_id }}
