name: Monitor Twitter Pokemon Drops

on:
  schedule:
    - cron: '*/10 * * * *'  # Cada 10 min
  workflow_dispatch:

jobs:
  twitter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - uses: actions/cache/restore@v5
        with:
          path: tweets_state.json
          # Clave única por run + restauración por prefijo (evita el "cache already exists").
          key: tweets-state-${{ github.run_id }}
          restore-keys: tweets-state-
      - env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 twitter_monitor.py
      - uses: actions/cache/save@v5
        if: always()
        with:
          path: tweets_state.json
          key: tweets-state-${{ github.run_id }}
